let _ghToken = null;
function getGitHubToken() {
  if (_ghToken) return _ghToken;
  const t = prompt("Введите GitHub Token для сохранения:\n(ghp_... — из настроек GitHub)");
  if (t && t.startsWith("ghp_")) { _ghToken = t; return t; }
  return null;
}

async function saveToGitHub(data) {
  const token = getGitHubToken();
  if (!token) throw new Error("Токен не введён");
  const owner = "sam31118-eng";
  const repo = "mizar-dashboard";
  const path = "data.json";
  const branch = "main";

  // 1. Get current file SHA
  const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;
  const getRes = await fetch(getUrl, {
    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
  });
  const current = await getRes.json();
  const sha = current.sha;

  // 2. PUT updated content
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" },
    body: JSON.stringify({
      message: `МИЦАР Dashboard: ${new Date().toLocaleString("ru-RU", {timeZone:"Europe/Moscow"})}`,
      content,
      sha,
      branch
    })
  });
  return putRes.ok;
}

function fetchDataJson(timeout = 15000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  const url = DATA_JSON_URL + "?t=" + Date.now();
  return fetch(url, { signal: controller.signal })
    .then(res => { clearTimeout(timer); if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .catch(err => { clearTimeout(timer); throw err; });
}

// INLINE EDIT COMPONENT

function InlineEdit({ value, onSave, style }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = useRef(null);

  useEffect(() => { setVal(value); }, [value]);
  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);

  if (editing) {
    return (
      <input
        ref={ref}
        className="inline-edit"
        value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={() => { setEditing(false); if (val !== value) onSave(val); }}
        onKeyDown={e => { if (e.key === "Enter") { setEditing(false); if (val !== value) onSave(val); } if (e.key === "Escape") { setEditing(false); setVal(value); } }}
        style={style}
        onClick={e => e.stopPropagation()}
      />
    );
  }
  return (
    <span
      onDoubleClick={(e) => { e.stopPropagation(); setEditing(true); }}
      style={{ ...style, cursor:"text" }}
      title="Двойной клик для редактирования"
    >
      {value}
    </span>
  );
}

          <button type="button" style={S.btnDanger} onClick={onCancel}>✕ Отмена</button>
        </div>
      </form>
    </div>
  );
}

// ============================================================
// ADD CONTACT FORM
// ============================================================
function AddContactForm({ onAdd, onCancel }) {
  const [name, setName] = useState("");
  const [touches, setTouches] = useState(0);
  const [status, setStatus] = useState("");
  const [next, setNext] = useState("");
  const [date, setDate] = useState("");

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!name.trim()) return;
    onAdd({
      name: name.trim(),
      touches: parseInt(touches, 10) || 0,
      status: status.trim() || "📝 Новый",
      next: next.trim(),
      date: date.trim() || new Date().toLocaleDateString("ru-RU", { day:"2-digit", month:"2-digit" })
    });
    setName(""); setTouches(0); setStatus(""); setNext(""); setDate("");
  };

  return (
    <div style={S.addForm}>
      <form onSubmit={handleSubmit}>
        <div style={S.formRow}>
          <div>
            <label className="form-label">Имя контакта *</label>
            <input className="form-input" value={name} onChange={e => setName(e.target.value)} placeholder="Имя или организация..." required />
          </div>
          <div>
            <label className="form-label">Касания</label>
            <input className="form-input" type="number" min="0" value={touches} onChange={e => setTouches(e.target.value)} />
          </div>
        </div>
        <div style={S.formRow}>
          <div>
            <label className="form-label">Статус</label>
            <input className="form-input" value={status} onChange={e => setStatus(e.target.value)} placeholder="⏳ Ожидание" />
          </div>
          <div>
            <label className="form-label">Дата</label>
            <input className="form-input" value={date} onChange={e => setDate(e.target.value)} placeholder="ДД.ММ" />
          </div>
        </div>
        <div style={S.formFull}>
          <label className="form-label">Следующий шаг</label>
          <input className="form-input" value={next} onChange={e => setNext(e.target.value)} placeholder="Что дальше..." />
        </div>
        <div style={{ display:"flex", gap:8, marginTop:4 }}>
          <button type="submit" style={S.btnG}>✓ Добавить</button>
          <button type="button" style={S.btnDanger} onClick={onCancel}>✕ Отмена</button>
        </div>
      </form>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [data, setData] = useState(INIT);
  const [tab, setTab] = useState("overview");
  const [syncing, setSyncing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [globalMsg, setGlobalMsg] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const [lastSync, setLastSync] = useState(null);
  const [dataSource, setDataSource] = useState("INIT");
  const [unsaved, setUnsaved] = useState(false);
  const [showAddTask, setShowAddTask] = useState(false);
  const [showAddRisk, setShowAddRisk] = useState(false);
  const [showAddContact, setShowAddContact] = useState(false);
  const [showAddTaskOverview, setShowAddTaskOverview] = useState(false);

  // Загрузка data.json из GitHub
  const loadFromGitHub = useCallback(async (silent) => {
    if (!silent) setSyncing(true);
    try {
      const d = await fetchDataJson();
      setData(prev => ({
        ...prev,
        tasks: d.tasks && d.tasks.length ? d.tasks : prev.tasks,
        risks: d.risks && d.risks.length ? d.risks : prev.risks,
        status: d.status || prev.status,
        contacts: d.contacts && d.contacts.length ? d.contacts : prev.contacts,
        team: d.team && d.team.length ? d.team : prev.team,
        docs: d.docs && d.docs.length ? d.docs : prev.docs,
        syncLog: [...(prev.syncLog || []), { section:"all", time:new Date().toISOString(), chars:JSON.stringify(d).length }]
      }));
      setLastSync(new Date());
      setUnsaved(false);
      setDataSource(d.exported_at ? `data.json | Экспорт: ${new Date(d.exported_at).toLocaleDateString("ru-RU")}` : "data.json");
      if (!silent) setGlobalMsg(`✅ Данные загружены | ${new Date().toLocaleTimeString("ru-RU")}`);
    } catch(e) {
      if (!silent) setGlobalMsg(`❌ Ошибка загрузки: ${e.message}`);
    }
    if (!silent) {
      setSyncing(false);
      setTimeout(() => setGlobalMsg(null), 6000);
    }
  }, []);

  // Автозагрузка при открытии страницы
  useEffect(() => { loadFromGitHub(true); }, [loadFromGitHub]);

  // Mark unsaved on data changes (except syncLog)
  const markUnsaved = () => setUnsaved(true);

  const toggleTask = (id) => {
    setData(p => ({ ...p, tasks: p.tasks.map(t => t.id === id ? { ...t, status: t.status==="done"?"pending":t.status==="pending"?"in_progress":"done" } : t) }));
    markUnsaved();
  };

  // ADD handlers
  const addTask = (task) => {
    setData(p => ({ ...p, tasks: [...p.tasks, task] }));
    markUnsaved();
    setShowAddTask(false);
    setShowAddTaskOverview(false);
  };

  const addRisk = (risk) => {
    setData(p => ({ ...p, risks: [...p.risks, risk] }));
    markUnsaved();
    setShowAddRisk(false);
  };

  const addContact = (contact) => {
    setData(p => ({ ...p, contacts: [...p.contacts, contact] }));
    markUnsaved();
    setShowAddContact(false);
  };

  // DELETE handlers
  const deleteTask = (id) => {
    if (!confirm(`Удалить задачу ${id}?`)) return;
    setData(p => ({ ...p, tasks: p.tasks.filter(t => t.id !== id) }));
    markUnsaved();
  };

  const deleteRisk = (id) => {
    if (!confirm(`Удалить риск ${id}?`)) return;
    setData(p => ({ ...p, risks: p.risks.filter(r => r.id !== id) }));
    markUnsaved();
  };

  const deleteContact = (name) => {
    if (!confirm(`Удалить контакт "${name}"?`)) return;
    setData(p => ({ ...p, contacts: p.contacts.filter(c => c.name !== name) }));
    markUnsaved();
  };

  // INLINE EDIT handlers
  const updateTask = (id, field, value) => {
    setData(p => ({ ...p, tasks: p.tasks.map(t => t.id === id ? { ...t, [field]: value } : t) }));
    markUnsaved();
  };

  const updateRisk = (id, field, value) => {
    setData(p => ({ ...p, risks: p.risks.map(r => r.id === id ? { ...r, [field]: value } : r) }));
    markUnsaved();
  };

  const updateContact = (idx, field, value) => {
    setData(p => ({ ...p, contacts: p.contacts.map((c, i) => i === idx ? { ...c, [field]: value } : c) }));
    markUnsaved();
  };

  // SAVE TO GITHUB
  const handleSaveToGitHub = async () => {
    setSaving(true);
    setGlobalMsg("💾 Сохранение на GitHub...");
    try {
      const payload = {
        exported_at: new Date().toISOString(),
        project: "Прикус Вселенной",
        code: "ЛЮБОВЬ",
        tasks: data.tasks,
        risks: data.risks,
        status: data.status,
        contacts: data.contacts,
        team: data.team,
        docs: data.docs
      };
      const ok = await saveToGitHub(payload);
      if (ok) {
        setGlobalMsg("✅ Сохранено на GitHub | " + new Date().toLocaleTimeString("ru-RU"));
        setUnsaved(false);
      } else {
        setGlobalMsg("❌ Ошибка сохранения на GitHub");
      }
    } catch (e) {
      setGlobalMsg("❌ Ошибка: " + e.message);
    }
    setSaving(false);
    setTimeout(() => setGlobalMsg(null), 5000);
  };

  const exportJSON = () => {
    const json = JSON.stringify({ exported_at: new Date().toISOString(), project: "Прикус Вселенной", code: "ЛЮБОВЬ", ...data }, null, 2);
    navigator.clipboard.writeText(json).then(() => setGlobalMsg("📋 JSON скопирован в буфер"));
    setTimeout(() => setGlobalMsg(null), 3000);
  };

  const downloadJSON = () => {
    const b = new Blob([JSON.stringify({ exported_at:new Date().toISOString(), project:"Прикус Вселенной", ...data }, null, 2)], { type:"application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `MIZAR_${new Date().toISOString().slice(0,10)}.json`; a.click();
  };

  const handleImport = () => {
    try {
      const p = JSON.parse(importText);
      if (p.tasks) setData(d => ({ ...d, tasks: p.tasks }));
      if (p.risks) setData(d => ({ ...d, risks: p.risks }));
      if (p.status) setData(d => ({ ...d, status: p.status }));
      if (p.contacts) setData(d => ({ ...d, contacts: p.contacts }));
      if (p.team) setData(d => ({ ...d, team: p.team }));
      setShowImport(false); setImportText("");
      setGlobalMsg("✅ Данные импортированы");
      markUnsaved();
      setTimeout(() => setGlobalMsg(null), 3000);
    } catch (e) { alert("JSON ошибка: " + e.message); }
  };

  const done = data.tasks.filter(t => t.status === "done").length;
  const total = data.tasks.length;
  const bibles = data.team.filter(t => t.bible === "✅").length;
  const sortedTasks = [...data.tasks].sort((a, b) => { const p = { critical:0, high:1, medium:2, low:3 }; return (p[a.priority]||3) - (p[b.priority]||3); });

  const tabs = [
    { id:"overview", l:"◉ Обзор" },
    { id:"tasks", l:"☰ Задачи" },
    { id:"contacts", l:"◎ Контакты" },
    { id:"team", l:"⚡ Команда" },
    { id:"docs", l:"📁 Документы" },
    { id:"export", l:"↗ Экспорт" },
  ];

  return (
    <div style={S.page}>
      {/* HEADER */}
      <div style={S.header}>
        <div>
          <h1 style={{ fontSize:20, fontWeight:700, letterSpacing:2, textShadow:"0 0 15px rgba(56,189,248,0.4)" }}>◈ МИЦАР</h1>
          <p style={{ marginTop:2, color:"#4a5568", fontSize:11 }}>Прикус Вселенной | {new Date().toLocaleDateString("ru-RU")} | Код: ЛЮБОВЬ</p>
        </div>
        <div style={{ display:"flex", gap:4, flexWrap:"wrap", alignItems:"center" }}>
          {tabs.map(t => <button key={t.id} style={S.tab(tab === t.id)} onClick={() => setTab(t.id)} onMouseOver={e => e.target.style.color = "#e2e8f0"} onMouseOut={e => { if (tab !== t.id) e.target.style.color = "#4a5568"; }}>{t.l}</button>)}
          <button onClick={() => loadFromGitHub(false)} disabled={syncing} style={{ ...S.btn, marginLeft:8, opacity:syncing?0.6:1 }}>
            <span style={{ display:"inline-block", animation:syncing?"spin 1s linear infinite":"none" }}>⟳</span> ВСЁ
          </button>
          <button
            onClick={handleSaveToGitHub}
            disabled={saving}
            className={unsaved ? "save-btn-glow" : ""}
            style={{ ...S.btnSave, opacity:saving?0.6:1 }}
          >
            💾 Сохранить
          </button>
        </div>
      </div>

      {/* STATUS BAR */}
      <div style={{ padding:"4px 20px", fontSize:10, color:"#4a5568", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
        <span>Источник: {dataSource}</span>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          {unsaved && (
            <span style={{ color:"#f59e0b", animation:"pulse 2s ease-in-out infinite" }}>● Есть несохранённые изменения</span>
          )}
          {lastSync && <span style={{ color:"#22c55e" }}>● Синхр: {lastSync.toLocaleTimeString("ru-RU")}</span>}
        </div>
      </div>

      {/* GLOBAL MSG */}
      {globalMsg && (
        <div style={{ padding:"8px 20px", fontSize:12, color:globalMsg.startsWith("✅")||globalMsg.startsWith("📋")||globalMsg.startsWith("💾")?"#22c55e":"#ef4444", background:globalMsg.startsWith("✅")||globalMsg.startsWith("📋")||globalMsg.startsWith("💾")?"rgba(34,197,94,0.06)":"rgba(239,68,68,0.06)", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
          {globalMsg}
        </div>
      )}

      <div style={{ padding:"20px", maxWidth:1200, margin:"0 auto" }}>

        {/* ====== OVERVIEW ====== */}
        {tab === "overview" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            {/* Metrics */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(130px, 1fr))", gap:10 }}>
              {[
                { n:data.status.captain, l:"КАПИТАН", c:data.status.captain >= 8 ? "#22c55e" : "#f59e0b" },
                { n:`${(data.status.balance||4000).toLocaleString()}₽`, l:"БАЛАНС", c:"#ef4444" },
                { n:`${done}/${total}`, l:"ЗАДАЧИ", c:"#38bdf8" },
                { n:`${data.contacts.length}/13`, l:"КОНТАКТЫ", c:"#8b5cf6" },
                { n:`${bibles}/13`, l:"БИБЛИИ", c:"#f59e0b" },
                { n:`${daysTo("2026-04-04")}д`, l:"ДО АНО", c:daysTo("2026-04-04") <= 7 ? "#ef4444" : "#f59e0b" },
              ].map((m, i) => (
                <div key={i} style={S.metricCard}>
                  <div style={{ fontSize:26, fontWeight:700, color:m.c }}>{m.n}</div>
                  <div style={{ fontSize:10, color:"#64748b", marginTop:3, textTransform:"uppercase", letterSpacing:1 }}>{m.l}</div>
                </div>
              ))}
            </div>

            {/* Risks + Contacts */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
              <div style={S.card}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <h3 style={{ ...S.subtitle, margin:0 }}>⚠ РИСКИ</h3>
                  <button style={S.btn} onClick={() => setShowAddRisk(!showAddRisk)}>+ Добавить</button>
                </div>
                {showAddRisk && <AddRiskForm onAdd={addRisk} onCancel={() => setShowAddRisk(false)} data={data} />}
                {data.risks.map(r => (
                  <div key={r.id} className="hoverable-row" style={{ marginBottom:8, padding:"8px 10px", borderRadius:6, background:`${SEV[r.sev]}08`, borderLeft:`3px solid ${SEV[r.sev]}`, position:"relative" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontWeight:600, fontSize:12 }}>
                        <InlineEdit value={r.title} onSave={v => updateRisk(r.id, "title", v)} />
                      </span>
                      <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                        <span style={S.pill(SEV[r.sev])}>{r.sev}</span>
                        <button className="delete-btn" onClick={() => deleteRisk(r.id)}>×</button>
                      </div>
                    </div>
                    <p style={{ margin:"4px 0 0", fontSize:11, color:"#7a8599" }}>
                      <InlineEdit value={r.text} onSave={v => updateRisk(r.id, "text", v)} style={{ fontSize:11, color:"#7a8599" }} />
                    </p>
                    <p style={{ margin:"2px 0 0", fontSize:10, color:"#64748b" }}>
                      Стратегия: <InlineEdit value={r.strategy} onSave={v => updateRisk(r.id, "strategy", v)} style={{ fontSize:10, color:"#64748b" }} />
                    </p>
                  </div>
                ))}
                <SyncBtn section="risks" onSync={() => loadFromGitHub(false)} />
              </div>

              <div style={S.card}>
                <h3 style={S.subtitle}>◎ КОНТАКТЫ ({data.contacts.length}/13)</h3>
                {data.contacts.map((c, i) => (
                  <div key={i} className="hoverable-row" style={{ marginBottom:6, padding:"6px 10px", borderRadius:6, background:"rgba(255,255,255,0.02)", display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:12 }}>
                    <div>
                      <strong>{c.name}</strong>
                      <span style={{ color:"#4a5568", marginLeft:6 }}>×{c.touches}</span>
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                      <span style={{ fontSize:11 }}>{c.status}</span>
                      <button className="delete-btn" onClick={() => deleteContact(c.name)}>×</button>
                    </div>
                  </div>
                ))}
                <SyncBtn section="status" onSync={() => loadFromGitHub(false)} />
              </div>
            </div>

            {/* Tasks preview */}
            <div style={S.card}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <h3 style={{ ...S.subtitle, margin:0 }}>☰ ЗАДАЧИ ({done}/{total})</h3>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <button style={S.btn} onClick={() => setShowAddTaskOverview(!showAddTaskOverview)}>+ Добавить</button>
                  <div style={S.bar}>
                    <div style={{ ...S.bar, width:160, position:"relative" }}>
                      <div style={{ height:4, borderRadius:2, width:`${(done/total)*100}%`, background:"linear-gradient(90deg,#3b82f6,#22c55e)", transition:"width 0.4s" }} />
                    </div>
                  </div>
                </div>
              </div>
              {showAddTaskOverview && <AddTaskForm onAdd={addTask} onCancel={() => setShowAddTaskOverview(false)} data={data} />}
              {sortedTasks.map(t => (
                <div key={t.id} className="hoverable-row" style={S.taskRow} onClick={() => toggleTask(t.id)}
                  onMouseOver={e => e.currentTarget.style.background = "rgba(56,189,248,0.04)"}
                  onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                  <div style={S.check(t.status)}>{t.status === "done" ? "✓" : t.status === "in_progress" ? "◐" : ""}</div>
                  <span style={{ flex:1, fontSize:12, textDecoration:t.status==="done"?"line-through":"none", opacity:t.status==="done"?0.4:1 }}>
                    {PRIO[t.priority]} <InlineEdit value={t.title} onSave={v => updateTask(t.id, "title", v)} />
                  </span>
                  <span style={{ fontSize:10, color:"#4a5568" }}>{t.assignee}</span>
                  {t.deadline && <span style={{ fontSize:10, color:deadlineColor(t.deadline), fontWeight:600 }}>{daysTo(t.deadline)}д</span>}
                  <button className="delete-btn" onClick={(e) => { e.stopPropagation(); deleteTask(t.id); }}>×</button>
                </div>
              ))}
              <SyncBtn section="tasks" onSync={() => loadFromGitHub(false)} />
            </div>
          </div>
        )}

        {/* ====== TASKS ====== */}
        {tab === "tasks" && (
          <div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <h3 style={{ ...S.subtitle, margin:0 }}>☰ ВСЕ ЗАДАЧИ ({done}/{total})</h3>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <button style={S.btn} onClick={() => setShowAddTask(!showAddTask)}>+ Добавить</button>
                <div style={{ width:180, ...S.bar }}><div style={{ height:4, borderRadius:2, width:`${(done/total)*100}%`, background:"linear-gradient(90deg,#3b82f6,#22c55e)" }} /></div>
              </div>
            </div>
            {showAddTask && <AddTaskForm onAdd={addTask} onCancel={() => setShowAddTask(false)} data={data} />}
            {sortedTasks.map(t => (
              <div key={t.id} className="hoverable-row" style={S.taskRow} onClick={() => toggleTask(t.id)}
                onMouseOver={e => e.currentTarget.style.background = "rgba(56,189,248,0.04)"}
                onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                <div style={S.check(t.status)}>{t.status==="done"?"✓":t.status==="in_progress"?"◐":""}</div>
                <span style={{ flex:1, fontSize:12, textDecoration:t.status==="done"?"line-through":"none", opacity:t.status==="done"?0.4:1 }}>
                  {PRIO[t.priority]} <InlineEdit value={t.title} onSave={v => updateTask(t.id, "title", v)} />
                </span>
                <span style={{ fontSize:10, color:"#4a5568" }}>{t.assignee}</span>
                {t.deadline && <span style={{ fontSize:10, color:deadlineColor(t.deadline), fontWeight:600 }}>{daysTo(t.deadline)}д</span>}
                <button className="delete-btn" onClick={(e) => { e.stopPropagation(); deleteTask(t.id); }}>×</button>
              </div>
            ))}
            <SyncBtn section="tasks" onSync={() => loadFromGitHub(false)} />
          </div>
        )}

        {/* ====== CONTACTS ====== */}
        {tab === "contacts" && (
          <div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <h3 style={{ ...S.subtitle, margin:0 }}>◎ ДОМИНО-СТРАТЕГИЯ — {data.contacts.length} из 13</h3>
              <button style={S.btn} onClick={() => setShowAddContact(!showAddContact)}>+ Добавить</button>
            </div>
            {showAddContact && <AddContactForm onAdd={addContact} onCancel={() => setShowAddContact(false)} />}
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>#</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Контакт</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Касания</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Статус</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Дата</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Следующий шаг</th>
                <th style={{ padding:8, textAlign:"center", color:"#4a5568", fontSize:10, textTransform:"uppercase", width:30 }}></th>
              </tr></thead>
              <tbody>
                {data.contacts.map((c, i) => (
                  <tr key={i} className="hoverable-row" style={{ borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
                    <td style={{ padding:8, color:"#4a5568" }}>{i + 1}</td>
                    <td style={{ padding:8, fontWeight:600 }}>
                      <InlineEdit value={c.name} onSave={v => updateContact(i, "name", v)} />
                    </td>
                    <td style={{ padding:8 }}><span style={S.pill("#38bdf8")}>{c.touches}</span></td>
                    <td style={{ padding:8, fontSize:11 }}>
                      <InlineEdit value={c.status} onSave={v => updateContact(i, "status", v)} style={{ fontSize:11 }} />

                    <td style={{ padding:8, color:"#7a8599", fontSize:11 }}>
                      <InlineEdit value={c.date} onSave={v => updateContact(i, "date", v)} style={{ fontSize:11, color:"#7a8599" }} />
                    </td>
                    <td style={{ padding:8, color:"#94a3b8", fontSize:11 }}>
                      <InlineEdit value={c.next} onSave={v => updateContact(i, "next", v)} style={{ fontSize:11, color:"#94a3b8" }} />
                    </td>
                    <td style={{ padding:8, textAlign:"center" }}>
                      <button className="delete-btn" onClick={() => deleteContact(c.name)}>×</button>
                    </td>
                  </tr>
                ))}
                {data.contacts.length < 13 && [...Array(Math.max(0, 13 - data.contacts.length))].map((_, i) => (
                  <tr key={`e${i}`} style={{ borderBottom:"1px solid rgba(255,255,255,0.02)", opacity:0.2 }}>
                    <td style={{ padding:8 }}>{data.contacts.length + i + 1}</td><td style={{ padding:8 }}>—</td><td style={{ padding:8 }}>0</td><td style={{ padding:8 }}>—</td><td style={{ padding:8 }}>—</td><td style={{ padding:8 }}>—</td><td></td>
                  </tr>
                ))}
              </tbody>
            </table>
            <SyncBtn section="status" onSync={() => loadFromGitHub(false)} />
          </div>
        )}

        {/* ====== TEAM ====== */}
        {tab === "team" && (
          <div style={S.card}>
            <h3 style={S.subtitle}>⚡ ЭКИПАЖ МИЦАР — {data.team.length} членов</h3>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, minWidth:700 }}>
                <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
                  {["#","Имя","Платформа","Роль","Персонаж","Тип","Дримкаст","Библия"].map(h =>
                    <th key={h} style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase", letterSpacing:1 }}>{h}</th>
                  )}
                </tr></thead>
                <tbody>
                  {data.team.map(m => (
                    <tr key={m.n} style={{ borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
                      <td style={{ padding:8, color:"#4a5568" }}>{m.n}</td>
                      <td style={{ padding:8, fontWeight:600 }}>{m.name}</td>
                      <td style={{ padding:8, color:"#7a8599", fontSize:11 }}>{m.platform}</td>
                      <td style={{ padding:8, fontSize:11 }}>{m.role}</td>
                      <td style={{ padding:8 }}>{m.char}</td>
                      <td style={{ padding:8 }}><span style={S.pill(m.type.includes("Прот") ? "#22c55e" : "#ef4444")}>{m.type}</span></td>
                      <td style={{ padding:8, color:"#7a8599", fontSize:11 }}>{m.cast}</td>
                      <td style={{ padding:8, textAlign:"center", fontSize:14 }}>{m.bible}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <SyncBtn section="team_short" onSync={() => loadFromGitHub(false)} />
          </div>
        )}

        {/* ====== DOCS ====== */}
        {tab === "docs" && (
          <div style={S.card}>
            <h3 style={S.subtitle}>📁 ГОТОВЫЕ ДОКУМЕНТЫ ({data.docs.length})</h3>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:8 }}>
              {data.docs.map((d, i) => (
                <div key={i} style={{ padding:"8px 12px", borderRadius:6, background:"rgba(34,197,94,0.04)", border:"1px solid rgba(34,197,94,0.12)", fontSize:12, display:"flex", justifyContent:"space-between" }}>
                  <span>{d.s} {d.name}</span>
                  <span style={{ color:"#64748b" }}>{d.date}</span>
                </div>
              ))}
            </div>
            <div style={{ marginTop:16 }}>
              <h4 style={{ fontSize:12, color:"#64748b", marginBottom:8 }}>Ссылки на Google Docs:</h4>
              {Object.entries(DOC_URLS).map(([key, url]) => (
                <div key={key} style={{ marginBottom:4 }}>
                  <a href={url} target="_blank" rel="noopener noreferrer" style={{ color:"#38bdf8", fontSize:11, textDecoration:"none" }}>
                    📄 {key} ↗
                  </a>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ====== EXPORT ====== */}
        {tab === "export" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={S.card}>
              <h3 style={S.subtitle}>↗ ЭКСПОРТ / ИМПОРТ</h3>
              <p style={{ fontSize:11, color:"#7a8599", marginBottom:12 }}>JSON-формат — любой ИИ (Claude, Grok, Gemini, Perplexity) может прочитать и предложить обновления.</p>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                <button style={S.btn} onClick={downloadJSON}>📥 Скачать JSON</button>
                <button style={S.btn} onClick={exportJSON}>📋 Копировать всё</button>
                <button style={S.btn} onClick={() => { navigator.clipboard.writeText(JSON.stringify(data.tasks, null, 2)); setGlobalMsg("📋 Задачи скопированы"); setTimeout(() => setGlobalMsg(null), 2000); }}>📋 Задачи</button>
                <button style={S.btn} onClick={() => { navigator.clipboard.writeText(JSON.stringify(data.risks, null, 2)); setGlobalMsg("📋 Риски скопированы"); setTimeout(() => setGlobalMsg(null), 2000); }}>📋 Риски</button>
                <button style={S.btnG} onClick={() => setShowImport(!showImport)}>📥 Импорт JSON</button>
              </div>
              {showImport && (
                <div>
                  <textarea rows={6} placeholder='Вставь JSON (из PowerShell, из другого ИИ, или предыдущий экспорт)...'
                    value={importText} onChange={e => setImportText(e.target.value)}
                    style={{ width:"100%", background:"rgba(8,12,31,0.9)", border:"1px solid rgba(56,189,248,0.15)", color:"#e2e8f0", fontFamily:"inherit", fontSize:11, padding:10, borderRadius:6, resize:"vertical" }} />
                  <button style={{ ...S.btnG, marginTop:6 }} onClick={handleImport}>Импортировать</button>
                </div>
              )}
            </div>

            <div style={S.card}>
              <h3 style={{ ...S.subtitle, marginBottom:8 }}>Предпросмотр JSON</h3>
              <textarea rows={18} readOnly
                value={JSON.stringify({ exported_at: new Date().toISOString(), project: "Прикус Вселенной", code: "ЛЮБОВЬ", ...data }, null, 2)}
                style={{ width:"100%", background:"rgba(8,12,31,0.9)", border:"1px solid rgba(56,189,248,0.15)", color:"#e2e8f0", fontFamily:"inherit", fontSize:11, padding:10, borderRadius:6, resize:"vertical" }} />
            </div>

            {data.syncLog && data.syncLog.length > 0 && (
              <div style={S.card}>
                <h3 style={S.subtitle}>📡 Лог синхронизаций</h3>
                {data.syncLog.slice(-10).reverse().map((l, i) => (
                  <div key={i} style={{ fontSize:11, color:"#7a8599", padding:"3px 0" }}>
                    {new Date(l.time).toLocaleTimeString("ru-RU")} — {l.section} — {l.chars} символов
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{ padding:"12px 20px", borderTop:"1px solid rgba(56,189,248,0.06)", textAlign:"center", color:"#2d3748", fontSize:10, marginTop:30 }}>
        МИЦАР Dashboard v4.0 | data.json → GitHub | Прикус Вселенной | Код: ЛЮБОВЬ |{" "}
        <a href="https://biteoftheuniverse.com" target="_blank" rel="noopener noreferrer" style={{ color:"#38bdf8", textDecoration:"none" }}>biteoftheuniverse.com</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
