// ============================================================
// FETCH (follows 302 redirects automatically)
// ============================================================
function syncFetch(url, timeout = 20000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  return fetch(url, { signal: controller.signal, redirect: 'follow' })
    .then(res => { clearTimeout(timer); if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .catch(err => { clearTimeout(timer); throw err; });
}

function SyncBtn({ section, onResult }) {
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState(null);

  const go = async () => {
    setLoading(true); setMsg(null);
    try {
      const url = section ? `${SYNC_URL}?section=${section}` : SYNC_URL;
      const data = await syncFetch(url);
      const size = data.char_count || JSON.stringify(data).length;
      setMsg({ ok:true, text:`✅ ${size} символов (${new Date().toLocaleTimeString("ru-RU")})` });
      if (onResult) onResult(section, data);
    } catch (e) {
      setMsg({ ok:false, text:`❌ ${e.message}` });
    }
    setLoading(false);
    setTimeout(() => setMsg(null), 8000);
  };

  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:10, flexWrap:"wrap" }}>
      <button onClick={go} disabled={loading} style={{ ...S.btn, opacity:loading?0.6:1, cursor:loading?"wait":"pointer" }}>
        <span style={{ display:"inline-block", animation:loading?"spin 1s linear infinite":"none" }}>⟳</span>
        {loading ? " Загрузка..." : " Синхронизировать"}
      </button>
      {DOC_URLS[section] && (
        <a href={DOC_URLS[section]} target="_blank" rel="noopener noreferrer" style={{ ...S.btn, textDecoration:"none", fontSize:10 }}>
          📄 Google Doc
        </a>
      )}
      {msg && <span style={{ fontSize:11, color:msg.ok?"#22c55e":"#ef4444" }}>{msg.text}</span>}
    </div>
  );
}

                    {PRIO[t.priority]} {t.title}
                  </span>
                  <span style={{ fontSize:10, color:"#4a5568" }}>{t.assignee}</span>
                  {t.deadline && <span style={{ fontSize:10, color:deadlineColor(t.deadline), fontWeight:600 }}>{daysTo(t.deadline)}д</span>}
                </div>
              ))}
              <SyncBtn section="tasks" onResult={handleSyncResult} />
            </div>
          </div>
        )}

        {/* ====== TASKS ====== */}
        {tab === "tasks" && (
          <div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <h3 style={{ ...S.subtitle, margin:0 }}>☰ ВСЕ ЗАДАЧИ ({done}/{total})</h3>
              <div style={{ width:180, ...S.bar }}><div style={{ height:4, borderRadius:2, width:`${(done/total)*100}%`, background:"linear-gradient(90deg,#3b82f6,#22c55e)" }} /></div>
            </div>
            {sortedTasks.map(t => (
              <div key={t.id} style={S.taskRow} onClick={() => toggleTask(t.id)}
                onMouseOver={e => e.currentTarget.style.background = "rgba(56,189,248,0.04)"}
                onMouseOut={e => e.currentTarget.style.background = "transparent"}>
                <div style={S.check(t.status)}>{t.status==="done"?"✓":t.status==="in_progress"?"◐":""}</div>
                <span style={{ flex:1, fontSize:12, textDecoration:t.status==="done"?"line-through":"none", opacity:t.status==="done"?0.4:1 }}>{PRIO[t.priority]} {t.title}</span>
                <span style={{ fontSize:10, color:"#4a5568" }}>{t.assignee}</span>
                {t.deadline && <span style={{ fontSize:10, color:deadlineColor(t.deadline), fontWeight:600 }}>{daysTo(t.deadline)}д</span>}
              </div>
            ))}
            <SyncBtn section="tasks" onResult={handleSyncResult} />
          </div>
        )}

        {/* ====== CONTACTS ====== */}
        {tab === "contacts" && (
          <div style={S.card}>
            <h3 style={S.subtitle}>◎ ДОМИНО-СТРАТЕГИЯ — {data.contacts.length} из 13</h3>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>#</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Контакт</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Касания</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Статус</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Дата</th>
                <th style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase" }}>Следующий шаг</th>
              </tr></thead>
              <tbody>
                {data.contacts.map((c, i) => (
                  <tr key={i} style={{ borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
                    <td style={{ padding:8, color:"#4a5568" }}>{i + 1}</td>
                    <td style={{ padding:8, fontWeight:600 }}>{c.name}</td>
                    <td style={{ padding:8 }}><span style={S.pill("#38bdf8")}>{c.touches}</span></td>
                    <td style={{ padding:8, fontSize:11 }}>{c.status}</td>
                    <td style={{ padding:8, color:"#7a8599", fontSize:11 }}>{c.date}</td>
                    <td style={{ padding:8, color:"#94a3b8", fontSize:11 }}>{c.next}</td>
                  </tr>
                ))}
                {[...Array(8)].map((_, i) => (
                  <tr key={`e${i}`} style={{ borderBottom:"1px solid rgba(255,255,255,0.02)", opacity:0.2 }}>
                    <td style={{ padding:8 }}>{i + 6}</td><td style={{ padding:8 }}>—</td><td style={{ padding:8 }}>0</td><td style={{ padding:8 }}>—</td><td style={{ padding:8 }}>—</td><td style={{ padding:8 }}>—</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <SyncBtn section="status" onResult={handleSyncResult} />
          </div>
        )}

        {/* ====== TEAM ====== */}
        {tab === "team" && (
          <div style={S.card}>
            <h3 style={S.subtitle}>⚡ ЭКИПАЖ МИЦАР — {data.team.length} членов</h3>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12, minWidth:700 }}>
                <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.08)" }}>
                  {["#","Имя","Платформа","Роль","Персонаж","Тип","Дримкаст","Библия"].map(h =>
                    <th key={h} style={{ padding:8, textAlign:"left", color:"#4a5568", fontSize:10, textTransform:"uppercase", letterSpacing:1 }}>{h}</th>
                  )}
                </tr></thead>
                <tbody>
                  {data.team.map(m => (
                    <tr key={m.n} style={{ borderBottom:"1px solid rgba(255,255,255,0.03)" }}>
                      <td style={{ padding:8, color:"#4a5568" }}>{m.n}</td>
                      <td style={{ padding:8, fontWeight:600 }}>{m.name}</td>
                      <td style={{ padding:8, color:"#7a8599", fontSize:11 }}>{m.platform}</td>
                      <td style={{ padding:8, fontSize:11 }}>{m.role}</td>
                      <td style={{ padding:8 }}>{m.char}</td>
                      <td style={{ padding:8 }}><span style={S.pill(m.type.includes("Прот") ? "#22c55e" : "#ef4444")}>{m.type}</span></td>
                      <td style={{ padding:8, color:"#7a8599", fontSize:11 }}>{m.cast}</td>
                      <td style={{ padding:8, textAlign:"center", fontSize:14 }}>{m.bible}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <SyncBtn section="team_short" onResult={handleSyncResult} />
          </div>
        )}

        {/* ====== DOCS ====== */}
        {tab === "docs" && (
          <div style={S.card}>
            <h3 style={S.subtitle}>📁 ГОТОВЫЕ ДОКУМЕНТЫ ({data.docs.length})</h3>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:8 }}>
              {data.docs.map((d, i) => (
                <div key={i} style={{ padding:"8px 12px", borderRadius:6, background:"rgba(34,197,94,0.04)", border:"1px solid rgba(34,197,94,0.12)", fontSize:12, display:"flex", justifyContent:"space-between" }}>
                  <span>{d.s} {d.name}</span>
                  <span style={{ color:"#64748b" }}>{d.date}</span>
                </div>
              ))}
            </div>
            <div style={{ marginTop:16 }}>
              <h4 style={{ fontSize:12, color:"#64748b", marginBottom:8 }}>Ссылки на Google Docs:</h4>
              {Object.entries(DOC_URLS).map(([key, url]) => (
                <div key={key} style={{ marginBottom:4 }}>
                  <a href={url} target="_blank" rel="noopener noreferrer" style={{ color:"#38bdf8", fontSize:11, textDecoration:"none" }}>
                    📄 {key} ↗
                  </a>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ====== EXPORT ====== */}
        {tab === "export" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={S.card}>
              <h3 style={S.subtitle}>↗ ЭКСПОРТ / ИМПОРТ</h3>
              <p style={{ fontSize:11, color:"#7a8599", marginBottom:12 }}>JSON-формат — любой ИИ (Claude, Grok, Gemini, Perplexity) может прочитать и предложить обновления.</p>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
                <button style={S.btn} onClick={downloadJSON}>📥 Скачать JSON</button>
                <button style={S.btn} onClick={exportJSON}>📋 Копировать всё</button>
                <button style={S.btn} onClick={() => { navigator.clipboard.writeText(JSON.stringify(data.tasks, null, 2)); setGlobalMsg("📋 Задачи скопированы"); setTimeout(() => setGlobalMsg(null), 2000); }}>📋 Задачи</button>
                <button style={S.btn} onClick={() => { navigator.clipboard.writeText(JSON.stringify(data.risks, null, 2)); setGlobalMsg("📋 Риски скопированы"); setTimeout(() => setGlobalMsg(null), 2000); }}>📋 Риски</button>
                <button style={S.btnG} onClick={() => setShowImport(!showImport)}>📥 Импорт JSON</button>
              </div>
              {showImport && (
                <div>
                  <textarea rows={6} placeholder='Вставь JSON (из PowerShell, из другого ИИ, или предыдущий экспорт)...'
                    value={importText} onChange={e => setImportText(e.target.value)}
                    style={{ width:"100%", background:"rgba(8,12,31,0.9)", border:"1px solid rgba(56,189,248,0.15)", color:"#e2e8f0", fontFamily:"inherit", fontSize:11, padding:10, borderRadius:6, resize:"vertical" }} />
                  <button style={{ ...S.btnG, marginTop:6 }} onClick={handleImport}>Импортировать</button>
                </div>
              )}
            </div>

            <div style={S.card}>
              <h3 style={{ ...S.subtitle, marginBottom:8 }}>Предпросмотр JSON</h3>
              <textarea rows={18} readOnly
                value={JSON.stringify({ exported_at: new Date().toISOString(), project: "Прикус Вселенной", code: "ЛЮБОВЬ", ...data }, null, 2)}
                style={{ width:"100%", background:"rgba(8,12,31,0.9)", border:"1px solid rgba(56,189,248,0.15)", color:"#e2e8f0", fontFamily:"inherit", fontSize:11, padding:10, borderRadius:6, resize:"vertical" }} />
            </div>

            {data.syncLog && data.syncLog.length > 0 && (
              <div style={S.card}>
                <h3 style={S.subtitle}>📡 Лог синхронизаций</h3>
                {data.syncLog.slice(-10).reverse().map((l, i) => (
                  <div key={i} style={{ fontSize:11, color:"#7a8599", padding:"3px 0" }}>
                    {new Date(l.time).toLocaleTimeString("ru-RU")} — {l.section} — {l.chars} символов
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{ padding:"12px 20px", borderTop:"1px solid rgba(56,189,248,0.06)", textAlign:"center", color:"#2d3748", fontSize:10, marginTop:30 }}>
        МИЦАР Dashboard v2.3 fetch | Прикус Вселенной | Код: ЛЮБОВЬ |{" "}
        <a href="https://biteoftheuniverse.com" target="_blank" rel="noopener noreferrer" style={{ color:"#38bdf8", textDecoration:"none" }}>biteoftheuniverse.com</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
